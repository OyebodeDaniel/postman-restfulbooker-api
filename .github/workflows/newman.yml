name: Newman API Tests — Restful Booker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'

jobs:
  api-tests:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Newman and reporters
        run: npm ci

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Newman tests
        run: npm run test:ci

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/api-test-report.html
          retention-days: 14

      - name: Upload JUnit XML results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results
          path: reports/results.xml
          retention-days: 14
